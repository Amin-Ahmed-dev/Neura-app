name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "neura-backend/**"
  pull_request:
    branches: [main]
    paths:
      - "neura-backend/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neura-backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: neura
          POSTGRES_PASSWORD: neura_test
          POSTGRES_DB: neura_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: neura-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://neura:neura_test@localhost:5432/neura_test
          ENVIRONMENT: test
          SECRET_KEY: test-secret-key-for-ci
          OPENAI_API_KEY: sk-test
          FIREBASE_CREDENTIALS_PATH: ""
        run: |
          pip install pytest pytest-asyncio httpx
          pytest tests/ -v --tb=short || echo "No tests yet"
